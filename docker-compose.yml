version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - ratelimit-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build: ./apps/api
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - ADMIN_SECRET=${ADMIN_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ratelimit-net

networks:
  ratelimit-net:
    driver: bridge

volumes:
  redis_data:
